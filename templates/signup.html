<!DOCTYPE html>
<html lang="en">

<head>
    <!-- Basic setup for the page -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up Page</title>

    <!-- Link to external CSS stylesheet -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style2.css') }}">

    <!-- Favicon for the page -->
    <link rel="icon" href="{{ url_for('static', filename='images/favicon-16x16.png') }}" type="image/png">
</head>

<body>
    <!-- Main container for the sign-up page -->
    <div class="container">
        <!-- Left section: Branding or welcome message -->
        <div class="left-section">
            <img class="logo" src="./static/images/healthcare.png" alt="Stethoscope Icon">

            <!-- Welcome message for the user -->
            <h2>Get Started with Symptom Solver</h2>
            <p>Always fully focused on helping your Health.</p>
        </div>

        <!-- Right section: Sign-up form and related elements -->
        <div class="right-section">
            <h3>Create Account</h3>

            <!-- Sign-up form -->
            <form action="{{ url_for('signup') }}" method="POST">
                <!-- Username input field -->
                <div class="form-group">
                    <label for="name">Username</label>
                    <input type="text" id="name" name="name" placeholder="Enter your full name" required>
                </div>

                <!-- Email input field -->
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="Enter your email" required>
                </div>

                <!-- Password input field -->
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter your password" required>
                </div>

                <!-- Confirm password input field -->
                <div class="form-group">
                    <label for="confirm_password">Confirm Password</label>
                    <input type="password" id="confirm_password" name="confirm_password"
                        placeholder="Confirm your password" required>
                </div>

                <!-- Create account button -->
                <button type="submit" class="create-btn">Create Account</button>
            </form>

            <!-- Link to the login page for users who already have an account -->
            <div class="login-link">
                Already have an account? <a href="{{ url_for('login') }}">Log in</a>
            </div>
        </div>
    </div>
</body>

</html>
