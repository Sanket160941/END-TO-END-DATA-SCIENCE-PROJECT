<!DOCTYPE html>
<html lang="en">

<head>
  <!-- Basic setup for the page -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile Page</title>

  <!-- Link to external CSS stylesheet -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/profile.css') }}">

  <!-- Favicon for the page -->
  <link rel="icon" href="{{ url_for('static', filename='images/favicon-16x16.png') }}" type="image/png">
</head>

<body>
  <!-- Main container for the profile page -->
  <div class="container">
    <!-- Section for displaying the logo -->
    <div class="image-section">
      <!-- Healthcare logo with a fixed width -->
      <img src="{{ url_for('static', filename='images/healthcare.png') }}" alt="Logo" class="navbar-logo"
        style="max-width: 70px; height: auto;">
    </div>

    <!-- Profile information section -->
    <div class="profile-section">
      <h1>Edit Profile</h1>

      <!-- Displaying the user's profile info -->
      <div class="profile-info">
        <!-- Username input field (disabled to prevent edits) -->
        <label for="username">Username:</label>
        <input type="text" id="username" value="{{ username }}" disabled>

        <!-- Email input field (disabled to prevent edits) -->
        <label for="email">Email:</label>
        <input type="email" id="email" value="{{ email }}" disabled>

        <!-- Age input field (disabled to prevent edits) -->
        <label for="age">Age:</label>
        <input type="number" id="age" value="{{ age }}" placeholder="Enter your age" disabled>

        <!-- Location input field (disabled to prevent edits) -->
        <label for="location">Location:</label>
        <input type="text" id="location" value="{{ location }}" placeholder="Enter your location" disabled>
      </div>
    </div>

    <!-- Buttons section for editing and saving profile -->
    <div class="button-section">
      <!-- Edit button to enable editing -->
      <button id="editButton">Edit</button>

      <!-- Save button (disabled initially, enables after editing) -->
      <button id="saveButton" disabled>Save</button>
    </div>
  </div>

  <!-- Link to the JavaScript file that handles the profile functionality -->
  <script src="{{ url_for('static', filename='script/profile.js') }}"></script>
</body>

</html>
